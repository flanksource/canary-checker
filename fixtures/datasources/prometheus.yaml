apiVersion: canaries.flanksource.com/v1
kind: Canary
metadata:
  name: prometheus
spec:
  schedule: "@every 5m"
  prometheus:
    - url: http://kube-prometheus-stack-prometheus.monitoring:9090
      name: prometheus-check
      query: kubernetes_build_info{job!~"kube-dns|coredns"}
      display:
        expr: results[0].git_version
