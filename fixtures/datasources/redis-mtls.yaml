apiVersion: canaries.flanksource.com/v1
kind: Canary
metadata:
  name: redis-mtls
spec:
  schedule: "@every 5m"
  redis:
    - name: redis mtls
      url: "redis-tls.canaries.svc.cluster.local:6379"
      tlsConfig:
        ca:
          valueFrom:
            secretKeyRef:
              name: redis-tls-ca
              key: ca.crt
        cert:
          valueFrom:
            secretKeyRef:
              name: redis-tls-client
              key: tls.crt
        key:
          valueFrom:
            secretKeyRef:
              name: redis-tls-client
              key: tls.key
