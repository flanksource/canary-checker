apiVersion: canaries.flanksource.com/v1
kind: Canary
metadata:
  name: redis-custom-ca
spec:
  schedule: "@every 5m"
  redis:
    - name: redis custom ca
      url: "redis-tls.canaries.svc.cluster.local:6379"
      tlsConfig:
        ca:
          valueFrom:
            secretKeyRef:
              name: redis-tls-ca
              key: ca.crt
